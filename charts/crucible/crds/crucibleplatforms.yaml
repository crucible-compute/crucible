apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: crucibleplatforms.crucible.dev
spec:
  group: crucible.dev
  names:
    kind: CruciblePlatform
    listKind: CruciblePlatformList
    plural: crucibleplatforms
    singular: crucibleplatform
    shortNames:
      - cp
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              required:
                - celeborn
                - volcano
                - historyServer
                - objectStore
              properties:
                celeborn:
                  type: object
                  required:
                    - workers
                    - workerStorage
                    - image
                  properties:
                    workers:
                      type: integer
                      minimum: 1
                    workerStorage:
                      type: string
                      enum:
                        - emptyDir
                        - nvme
                        - gp3
                    image:
                      type: string
                      minLength: 1
                  x-kubernetes-validations:
                    - rule: "self.workers >= 2 || self.workerStorage == 'emptyDir'"
                      message: "Production storage types require at least 2 workers for replication"
                volcano:
                  type: object
                  required:
                    - tenants
                  properties:
                    tenants:
                      type: array
                      minItems: 1
                      items:
                        type: object
                        required:
                          - name
                        properties:
                          name:
                            type: string
                            minLength: 1
                            pattern: "^[a-z][a-z0-9-]*$"
                          queueWeight:
                            type: integer
                            minimum: 1
                  x-kubernetes-validations:
                    - rule: "self.tenants.map(t, t.name).size() == self.tenants.size()"
                      message: "Tenant names must be unique"
                historyServer:
                  type: object
                  required:
                    - enabled
                  properties:
                    enabled:
                      type: boolean
                    image:
                      type: string
                  x-kubernetes-validations:
                    - rule: "!self.enabled || has(self.image)"
                      message: "image is required when historyServer is enabled"
                objectStore:
                  type: object
                  required:
                    - bucket
                  properties:
                    bucket:
                      type: string
                      minLength: 1
                    endpoint:
                      type: string
                    region:
                      type: string
            status:
              type: object
              properties:
                phase:
                  type: string
                  enum:
                    - Pending
                    - Deploying
                    - Ready
                    - Degraded
                    - Error
                conditions:
                  type: array
                  items:
                    type: object
                    required:
                      - type
                      - status
                    properties:
                      type:
                        type: string
                        enum:
                          - CelebornReady
                          - VolcanoReady
                          - HistoryServerReady
                          - FlinkOperatorReady
                          - ApiServerReady
                      status:
                        type: string
                        enum:
                          - "True"
                          - "False"
                          - Unknown
                      message:
                        type: string
                      lastTransitionTime:
                        type: string
                        format: date-time
      additionalPrinterColumns:
        - name: Phase
          type: string
          jsonPath: .status.phase
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
