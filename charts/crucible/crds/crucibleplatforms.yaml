apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: crucibleplatforms.crucible.dev
spec:
  group: crucible.dev
  names:
    kind: CruciblePlatform
    listKind: CruciblePlatformList
    plural: crucibleplatforms
    singular: crucibleplatform
    shortNames:
      - cp
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              required:
                - celeborn
                - volcano
                - historyServer
                - objectStore
              properties:
                celeborn:
                  type: object
                  required:
                    - workers
                    - workerStorage
                    - image
                  properties:
                    workers:
                      type: integer
                      minimum: 1
                    workerStorage:
                      type: string
                    image:
                      type: string
                volcano:
                  type: object
                  required:
                    - tenants
                  properties:
                    tenants:
                      type: array
                      items:
                        type: object
                        required:
                          - name
                        properties:
                          name:
                            type: string
                          queueWeight:
                            type: integer
                            minimum: 1
                historyServer:
                  type: object
                  required:
                    - enabled
                  properties:
                    enabled:
                      type: boolean
                    image:
                      type: string
                objectStore:
                  type: object
                  required:
                    - bucket
                  properties:
                    bucket:
                      type: string
                    endpoint:
                      type: string
                    region:
                      type: string
            status:
              type: object
              properties:
                phase:
                  type: string
                conditions:
                  type: array
                  items:
                    type: object
                    properties:
                      type:
                        type: string
                      status:
                        type: string
                      message:
                        type: string
                      lastTransitionTime:
                        type: string
                        format: date-time
