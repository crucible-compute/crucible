apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: cruciblesparkjobs.crucible.dev
spec:
  group: crucible.dev
  names:
    kind: CrucibleSparkJob
    listKind: CrucibleSparkJobList
    plural: cruciblesparkjobs
    singular: cruciblesparkjob
    shortNames:
      - csj
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              required:
                - jar
                - class
                - tenant
              properties:
                jar:
                  type: string
                class:
                  type: string
                args:
                  type: array
                  items:
                    type: string
                tenant:
                  type: string
                  minLength: 1
                executors:
                  type: integer
                  minimum: 1
                driverResources:
                  type: object
                  properties:
                    cpu:
                      type: string
                    memory:
                      type: string
                executorResources:
                  type: object
                  properties:
                    cpu:
                      type: string
                    memory:
                      type: string
                sparkConfig:
                  type: object
                  additionalProperties:
                    type: string
                labels:
                  type: object
                  additionalProperties:
                    type: string
            status:
              type: object
              properties:
                phase:
                  type: string
                  enum:
                    - Submitted
                    - Running
                    - Completed
                    - Failed
                    - Killed
                driverPod:
                  type: string
                executorPods:
                  type: array
                  items:
                    type: string
                uiUrl:
                  type: string
                error:
                  type: string
                startTime:
                  type: string
                  format: date-time
                endTime:
                  type: string
                  format: date-time
