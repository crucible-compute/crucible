apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: crucibleflinkjobs.crucible.dev
spec:
  group: crucible.dev
  names:
    kind: CrucibleFlinkJob
    listKind: CrucibleFlinkJobList
    plural: crucibleflinkjobs
    singular: crucibleflinkjob
    shortNames:
      - cfj
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              required:
                - jar
                - entryClass
                - tenant
              properties:
                jar:
                  type: string
                  minLength: 1
                entryClass:
                  type: string
                  minLength: 1
                parallelism:
                  type: integer
                  minimum: 1
                  maximum: 1000
                taskManagers:
                  type: integer
                  minimum: 1
                  maximum: 1000
                tenant:
                  type: string
                  minLength: 1
                  pattern: "^[a-z][a-z0-9-]*$"
                flinkConfig:
                  type: object
                  additionalProperties:
                    type: string
                labels:
                  type: object
                  additionalProperties:
                    type: string
              x-kubernetes-validations:
                - rule: "self.jar.endsWith('.jar') || self.jar.startsWith('s3://') || self.jar.startsWith('gs://') || self.jar.startsWith('local://')"
                  message: "jar must be a .jar file or an object store URI (s3://, gs://, local://)"
            status:
              type: object
              properties:
                phase:
                  type: string
                  enum:
                    - Submitted
                    - Running
                    - Completed
                    - Failed
                    - Killed
                    - Suspended
                    - Cancelled
                jobManagerPod:
                  type: string
                uiUrl:
                  type: string
                error:
                  type: string
                lastSavepointPath:
                  type: string
                startTime:
                  type: string
                  format: date-time
                endTime:
                  type: string
                  format: date-time
      additionalPrinterColumns:
        - name: Phase
          type: string
          jsonPath: .status.phase
        - name: Tenant
          type: string
          jsonPath: .spec.tenant
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
