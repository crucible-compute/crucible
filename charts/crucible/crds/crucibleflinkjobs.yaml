apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: crucibleflinkjobs.crucible.dev
spec:
  group: crucible.dev
  names:
    kind: CrucibleFlinkJob
    listKind: CrucibleFlinkJobList
    plural: crucibleflinkjobs
    singular: crucibleflinkjob
    shortNames:
      - cfj
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              required:
                - jar
                - entryClass
                - tenant
              properties:
                jar:
                  type: string
                entryClass:
                  type: string
                parallelism:
                  type: integer
                  minimum: 1
                taskManagers:
                  type: integer
                  minimum: 1
                tenant:
                  type: string
                  minLength: 1
                flinkConfig:
                  type: object
                  additionalProperties:
                    type: string
                labels:
                  type: object
                  additionalProperties:
                    type: string
            status:
              type: object
              properties:
                phase:
                  type: string
                  enum:
                    - Submitted
                    - Running
                    - Completed
                    - Failed
                    - Killed
                    - Suspended
                    - Cancelled
                jobManagerPod:
                  type: string
                uiUrl:
                  type: string
                error:
                  type: string
                lastSavepointPath:
                  type: string
                startTime:
                  type: string
                  format: date-time
                endTime:
                  type: string
                  format: date-time
