apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "crucible.fullname" . }}
  labels:
    {{- include "crucible.labels" . | nindent 4 }}
rules:
  # CRD management
  - apiGroups: ["crucible.dev"]
    resources:
      - crucibleplatforms
      - crucibleplatforms/status
      - cruciblesparkjobs
      - cruciblesparkjobs/status
      - crucibleflinkjobs
      - crucibleflinkjobs/status
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # Sub-component lifecycle (pods, services, deployments, statefulsets)
  - apiGroups: [""]
    resources: ["pods", "pods/log", "services", "configmaps", "secrets", "serviceaccounts"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["apps"]
    resources: ["deployments", "statefulsets"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # Leader election via leases
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # Events for status reporting
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch"]
  # Volcano CRDs (queues, podgroups)
  - apiGroups: ["scheduling.volcano.sh"]
    resources: ["queues", "podgroups"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # Flink Operator CRDs
  - apiGroups: ["flink.apache.org"]
    resources: ["flinkdeployments", "flinksessionjobs"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "crucible.fullname" . }}
  labels:
    {{- include "crucible.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "crucible.fullname" . }}
subjects:
  - kind: ServiceAccount
    name: {{ include "crucible.serviceAccountName" . }}
    namespace: {{ include "crucible.namespace" . }}
