apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "crucible.fullname" . }}-api
  namespace: {{ include "crucible.namespace" . }}
  labels:
    {{- include "crucible.labels" . | nindent 4 }}
    {{- include "crucible.api.selectorLabels" . | nindent 4 }}
spec:
  replicas: {{ .Values.api.replicas }}
  selector:
    matchLabels:
      {{- include "crucible.api.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "crucible.labels" . | nindent 8 }}
        {{- include "crucible.api.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "crucible.serviceAccountName" . }}
      containers:
        - name: api
          image: "{{ .Values.image.api.repository }}:{{ .Values.image.api.tag }}"
          imagePullPolicy: {{ .Values.image.api.pullPolicy }}
          env:
            - name: CRUCIBLE_ENV
              value: "production"
            - name: RUST_LOG
              value: "info"
          ports:
            - name: http
              containerPort: {{ .Values.api.port }}
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            {{- toYaml .Values.api.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "crucible.fullname" . }}-api
  namespace: {{ include "crucible.namespace" . }}
  labels:
    {{- include "crucible.labels" . | nindent 4 }}
    {{- include "crucible.api.selectorLabels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.api.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "crucible.api.selectorLabels" . | nindent 4 }}
